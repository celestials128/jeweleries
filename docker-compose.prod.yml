services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - celestials-net

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      NETOPIA_SIGNATURE: ${NETOPIA_SIGNATURE}
      NETOPIA_START_URL: ${NETOPIA_START_URL}
      NETOPIA_RETURN_URL: ${NETOPIA_RETURN_URL}
      NETOPIA_PUBLIC_CERT_PATH: ${NETOPIA_PUBLIC_CERT_PATH}
      JWT_SECRET: ${JWT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: https://${DOMAIN},https://www.${DOMAIN}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: uploads
      STORAGE_LOCAL_BASE_URL: https://${DOMAIN}
    volumes:
      - uploads:/app/uploads
      - ./backend/config/netopia:/app/config/netopia
    depends_on:
      db:
        condition: service_healthy
    networks:
      - celestials-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://${DOMAIN}
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - celestials-net

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - celestials-net

volumes:
  db-data:
  uploads:
  caddy-data:
  caddy-config:

networks:
  celestials-net:
    driver: bridge
