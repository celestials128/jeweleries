spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/celestials_db}
    username: ${SPRING_DATASOURCE_USERNAME:celestials}
    password: ${SPRING_DATASOURCE_PASSWORD:celestials}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

server:
  port: 8080
  forward-headers-strategy: framework

netopia:
  signature: ${NETOPIA_SIGNATURE:}
  start-url: ${NETOPIA_START_URL:https://secure.sandbox.netopia-payments.com/payment/card/start}
  confirm-url: ${NETOPIA_CONFIRM_URL:http://localhost:8080/api/payments/netopia/confirm}
  return-url: ${NETOPIA_RETURN_URL:http://localhost:3000/orders}
  public-cert-path: ${NETOPIA_PUBLIC_CERT_PATH:/app/config/netopia/public.cer}
  currency: ${NETOPIA_CURRENCY:RON}
  merchant-name: ${NETOPIA_MERCHANT_NAME:Celestials}

jwt:
  secret: ${JWT_SECRET:changeit123456789012345678901234}
  exp-ms: 3600000

logging:
  level:
    root: INFO

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://[::1]:5173}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    path: ${STORAGE_LOCAL_PATH:uploads}
    base-url: ${STORAGE_LOCAL_BASE_URL:http://localhost:8080}
