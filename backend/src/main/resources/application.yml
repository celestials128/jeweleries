spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/celestials_db}
    username: ${SPRING_DATASOURCE_USERNAME:celestials}
    password: ${SPRING_DATASOURCE_PASSWORD:celestials}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}

server:
  port: 8080
  forward-headers-strategy: framework

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

jwt:
  secret: ${JWT_SECRET:changeit123456789012345678901234}
  exp-ms: 3600000

logging:
  level:
    root: INFO

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    path: ${STORAGE_LOCAL_PATH:uploads}
    base-url: ${STORAGE_LOCAL_BASE_URL:http://localhost:8080}
