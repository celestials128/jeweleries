spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://db:5432/celestials_db
    username: celestials
    password: celestials
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
netopia:
  signature: ${NETOPIA_SIGNATURE:}
  start-url: ${NETOPIA_START_URL:https://secure.sandbox.netopia-payments.com/payment/card/start}
  confirm-url: ${NETOPIA_CONFIRM_URL:http://localhost:8080/api/payments/netopia/confirm}
  return-url: ${NETOPIA_RETURN_URL:http://localhost:3000/orders}
  public-cert-path: ${NETOPIA_PUBLIC_CERT_PATH:/app/config/netopia/public.cer}
  currency: ${NETOPIA_CURRENCY:RON}
  merchant-name: ${NETOPIA_MERCHANT_NAME:Celestials}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:*,http://127.0.0.1:*,http://[::1]:*}

storage:
  type: ${STORAGE_TYPE:local}
  local:
    path: ${STORAGE_LOCAL_PATH:uploads}
    base-url: ${STORAGE_LOCAL_BASE_URL:http://localhost:8080}
  s3:
    access-key: ${S3_ACCESS_KEY:}
    secret-key: ${S3_SECRET_KEY:}
    bucket: ${S3_BUCKET:celestials}
    region: ${S3_REGION:us-east-1}
    endpoint: ${S3_ENDPOINT:}
    public-url: ${S3_PUBLIC_URL:}
