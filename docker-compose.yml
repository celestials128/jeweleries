version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: celestials_db
      POSTGRES_USER: celestials
      POSTGRES_PASSWORD: celestials
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celestials"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - celestials-net

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/celestials_db
      SPRING_DATASOURCE_USERNAME: celestials
      SPRING_DATASOURCE_PASSWORD: celestials
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_xxx}
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - celestials-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
        VITE_STRIPE_PK: ${VITE_STRIPE_PK:-pk_test_4eC39HqLyjWDarhtT657B3h5}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - celestials-net

volumes:
  db-data:

networks:
  celestials-net:
    driver: bridge
