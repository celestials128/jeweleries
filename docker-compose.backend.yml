services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: celestials_db
      POSTGRES_USER: celestials
      POSTGRES_PASSWORD: celestials
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celestials"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - celestials-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/celestials_db
      SPRING_DATASOURCE_USERNAME: celestials
      SPRING_DATASOURCE_PASSWORD: celestials
      NETOPIA_SIGNATURE: ${NETOPIA_SIGNATURE:-}
      NETOPIA_START_URL: ${NETOPIA_START_URL:-https://secure.sandbox.netopia-payments.com/payment/card/start}
      NETOPIA_RETURN_URL: ${NETOPIA_RETURN_URL:-http://localhost:3000/orders}
      NETOPIA_PUBLIC_CERT_PATH: ${NETOPIA_PUBLIC_CERT_PATH:-/app/config/netopia/public.cer}
    volumes:
      - ./backend/config/netopia:/app/config/netopia
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - celestials-net

volumes:
  db-data:

networks:
  celestials-net:
    driver: bridge
